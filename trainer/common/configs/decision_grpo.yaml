# Decision Agent GRPO Training Configuration
# Agent A: VLM Decision Agent trained with Group Relative Policy Optimization

# ── Model ─────────────────────────────────────────────────────────────
model:
  name: "gpt-4o-mini"
  temperature: 0.7            # sampling temperature for rollouts
  eval_temperature: 0.0       # greedy for eval
  max_tokens: 400

# ── Reward costs ──────────────────────────────────────────────────────
costs:
  c_mem: -0.05                # cost per QUERY_MEM action
  c_skill: -0.05              # cost per QUERY_SKILL action
  c_call: -0.02               # cost per CALL_SKILL action
  c_switch: -0.10             # cost per skill switch (active_skill changes)

# ── Follow shaping ───────────────────────────────────────────────────
follow_shaping:
  w_follow: 0.1               # weight on r_follow relative to r_env
  predicate_bonus: 0.05       # per newly satisfied eff_add predicate
  completion_bonus: 0.20      # all eff_add satisfied
  no_progress_penalty: -0.01  # per step with no new predicate progress
  late_state_window: 5        # steps to look back for late-state detection

# ── GRPO ──────────────────────────────────────────────────────────────
grpo:
  group_size: 8               # G: number of rollouts per prompt group
  clip_ratio: 0.2             # PPO-style clipping (ε)
  kl_coeff: 0.01              # KL penalty coefficient (β)
  lr: 1.0e-5                  # learning rate
  epochs_per_batch: 4         # gradient epochs per rollout batch
  max_grad_norm: 1.0          # gradient clipping
  gamma: 0.99                 # discount factor
  gae_lambda: 0.95            # GAE lambda
  normalize_advantages: true  # normalize advantages within group
  entropy_coeff: 0.01         # entropy bonus coefficient

# ── Rollout collection ───────────────────────────────────────────────
rollout:
  batch_size: 32              # episodes per training batch
  max_steps: 500              # max steps per episode
  num_workers: 4              # parallel rollout workers
  retrieval_budget_n: 10      # allow retrieval every N steps
  skill_abort_k: 5            # abort skill after K steps without progress

# ── Replay buffer ────────────────────────────────────────────────────
replay:
  capacity: 10000             # max episodes in buffer
  priority_alpha: 0.6         # prioritized replay exponent
  priority_beta: 0.4          # importance sampling correction
  min_episodes: 64            # min episodes before training starts

# ── Evaluation ───────────────────────────────────────────────────────
eval:
  interval_episodes: 50       # evaluate every N training episodes
  num_eval_episodes: 10       # episodes per eval run
  seeds: [42, 137, 256, 512, 1024, 2048, 4096, 8192]  # fixed eval seeds
  timeout_steps: 1000         # max steps per eval episode

# ── Logging ──────────────────────────────────────────────────────────
logging:
  log_dir: "runs/decision_grpo"
  log_interval: 10            # log every N episodes
  save_interval: 100          # checkpoint every N episodes
  use_wandb: false
  wandb_project: "game-ai-decision"

# ── Training schedule ────────────────────────────────────────────────
schedule:
  total_episodes: 50000
  warmup_episodes: 100        # random policy warmup
  bank_update_cadence: 500    # episodes between bank updates (co-evolution)
